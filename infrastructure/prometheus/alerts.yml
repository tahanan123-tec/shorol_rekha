groups:
  - name: service_health
    interval: 10s
    rules:
      # Service Down Alert
      - alert: ServiceDown
        expr: up{job=~"identity-provider|order-gateway|stock-service|kitchen-queue|notification-hub"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      # Gateway High Latency Alert (REQUIRED: > 1s for 30s)
      - alert: GatewayHighLatency
        expr: |
          rate(http_request_duration_seconds_sum{service="order-gateway"}[1m]) / 
          rate(http_request_duration_seconds_count{service="order-gateway"}[1m]) > 1
        for: 30s
        labels:
          severity: critical
          service: order-gateway
        annotations:
          summary: "Order Gateway latency exceeded 1 second"
          description: "Order Gateway has average latency > 1s for 30 seconds. Current: {{ $value }}s"

      # High Latency Alert (General)
      - alert: HighLatency
        expr: |
          rate(http_request_duration_seconds_sum[5m]) / 
          rate(http_request_duration_seconds_count[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "{{ $labels.service }} has average latency > 1s for 5 minutes."

      # High Error Rate Alert
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) / 
          rate(http_requests_total[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has error rate > 5% for 5 minutes."

      # Low Order Throughput Alert
      - alert: LowOrderThroughput
        expr: rate(orders_created_total[5m]) * 60 < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low order throughput"
          description: "Order throughput is below 10 orders/minute for 10 minutes."

  - name: resource_usage
    interval: 30s
    rules:
      # High Memory Usage (if available)
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.service }}"
          description: "{{ $labels.service }} is using more than 500MB of memory."

      # Too Many Open Connections
      - alert: TooManyConnections
        expr: websocket_connections_total > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many WebSocket connections"
          description: "Notification Hub has more than 10,000 active connections."

  - name: business_metrics
    interval: 30s
    rules:
      # Stock Depletion Alert
      - alert: StockDepleted
        expr: stock_quantity{item_id=~".*"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Stock depleted for {{ $labels.item_id }}"
          description: "Item {{ $labels.item_id }} is out of stock."

      # Queue Buildup Alert
      - alert: QueueBuildup
        expr: rabbitmq_queue_messages > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue buildup"
          description: "Queue {{ $labels.queue }} has more than 1000 messages."

      # Failed Orders Alert
      - alert: HighFailedOrders
        expr: rate(orders_failed_total[5m]) * 60 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High failed order rate"
          description: "More than 5 orders per minute are failing."
