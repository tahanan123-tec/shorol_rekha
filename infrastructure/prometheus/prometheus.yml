global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cafeteria-system'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Identity Provider
  - job_name: 'identity-provider'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['identity-provider:3001']
        labels:
          service: 'identity-provider'
          tier: 'auth'

  # Order Gateway
  - job_name: 'order-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['order-gateway:3002']
        labels:
          service: 'order-gateway'
          tier: 'api'

  # Stock Service
  - job_name: 'stock-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['stock-service:3003']
        labels:
          service: 'stock-service'
          tier: 'backend'

  # Kitchen Queue
  - job_name: 'kitchen-queue'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kitchen-queue:3004']
        labels:
          service: 'kitchen-queue'
          tier: 'worker'

  # Notification Hub
  - job_name: 'notification-hub'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notification-hub:3005']
        labels:
          service: 'notification-hub'
          tier: 'realtime'

  # PostgreSQL Exporter (optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis Exporter (optional)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # RabbitMQ Exporter (optional)
  # - job_name: 'rabbitmq'
  #   static_configs:
  #     - targets: ['rabbitmq:15692']
