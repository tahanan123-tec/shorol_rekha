# Production-Grade NGINX Reverse Proxy with WAF
# Protects cafeteria system from malicious traffic

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with security details
    log_format security '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time" '
                       'blocked=$limit_req_status';

    access_log /var/log/nginx/access.log security;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1m;
    
    # Hide NGINX version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Rate limiting zones (optimized for 200+ req/s)
    # Zone 1: Global rate limit per IP
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=500r/s;
    
    # Zone 2: Login endpoint protection
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;
    
    # Zone 3: Order endpoint protection
    limit_req_zone $binary_remote_addr zone=order_limit:10m rate=30r/s;
    
    # Zone 4: API general protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Request status tracking for blocking
    limit_req_status 429;
    limit_conn_status 429;

    # GeoIP blocking (optional - requires GeoIP module)
    # geo $blocked_country {
    #     default 0;
    #     CN 1;  # Block China
    #     RU 1;  # Block Russia
    # }

    # Map to detect suspicious user agents
    map $http_user_agent $blocked_agent {
        default 0;
        ~*bot 1;
        ~*crawler 1;
        ~*spider 1;
        ~*scraper 1;
        ~*scanner 1;
        ~*nikto 1;
        ~*sqlmap 1;
        ~*nmap 1;
        ~*masscan 1;
        "" 1;  # Empty user agent
    }

    # Map to detect SQL injection patterns
    map $request_uri $sql_injection {
        default 0;
        ~*union.*select 1;
        ~*select.*from 1;
        ~*insert.*into 1;
        ~*delete.*from 1;
        ~*drop.*table 1;
        ~*update.*set 1;
        ~*exec.*\( 1;
        ~*script.*\> 1;
        ~*\<.*script 1;
        ~*javascript: 1;
        ~*onerror.*= 1;
        ~*onload.*= 1;
    }

    # Upstream backend services
    upstream identity_provider {
        least_conn;
        server identity-provider:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream order_gateway {
        least_conn;
        server order-gateway:3002 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream admin_dashboard {
        least_conn;
        server admin-dashboard:3100 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream client_app {
        least_conn;
        server client:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream notification_hub {
        least_conn;
        server notification-hub:3005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream stock_service {
        least_conn;
        server stock-service:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Redirect HTTP to HTTPS in production
        # return 301 https://$server_name$request_uri;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;
        
        # HSTS header (uncomment for HTTPS)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Block suspicious user agents
        if ($blocked_agent) {
            return 403 "Forbidden: Suspicious user agent";
        }

        # Block SQL injection attempts
        if ($sql_injection) {
            return 403 "Forbidden: SQL injection detected";
        }

        # Block requests with no user agent
        if ($http_user_agent = "") {
            return 403 "Forbidden: No user agent";
        }

        # Global connection limit (increased for high load)
        limit_conn conn_limit 20;

        # Global rate limit (increased for 200+ req/s)
        limit_req zone=global_limit burst=500 nodelay;

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Identity Provider - Login endpoint (relaxed rate limiting)
        location /auth/login {
            # Relaxed rate limiting for login (10 req/s per IP)
            limit_req zone=login_limit burst=20 nodelay;
            
            # Additional security headers
            add_header X-Frame-Options "DENY" always;
            
            # Request validation
            if ($request_method !~ ^(POST)$) {
                return 405;
            }

            # Content-Type validation
            if ($content_type !~ "application/json") {
                return 415 "Unsupported Media Type";
            }

            proxy_pass http://identity_provider;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Identity Provider - Other auth endpoints
        location /auth {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://identity_provider;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Order Gateway - All API endpoints
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://order_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Stock service direct access
        location ~ ^/stock(/.*)?$ {
            limit_req zone=api_limit burst=200 nodelay;
            
            # Rewrite /stock or /stock/ to /api/menu
            # Rewrite /stock/something to /api/something
            set $stock_path $1;
            if ($stock_path = "") {
                set $stock_path "/menu";
            }
            if ($stock_path = "/") {
                set $stock_path "/menu";
            }
            
            rewrite ^/stock(/.*)?$ /api$stock_path break;
            
            proxy_pass http://stock_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Enable caching for stock data
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        }

        # WebSocket endpoint for notifications
        location /socket.io/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://notification_hub;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # Admin dashboard
        location /admin {
            limit_req zone=api_limit burst=50 nodelay;
            
            rewrite ^/admin/(.*) /$1 break;
            rewrite ^/admin$ / break;
            
            proxy_pass http://admin_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Client application (must be last)
        location / {
            limit_req zone=api_limit burst=200 nodelay;
            
            proxy_pass http://client_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Block access to sensitive files
        location ~ \.(env|git|svn|htaccess|htpasswd)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>Too Many Requests</title></head><body><h1>429 Too Many Requests</h1><p>You have exceeded the rate limit. Please try again later.</p></body></html>';
        }

        error_page 403 /403.html;
        location = /403.html {
            internal;
            default_type text/html;
            return 403 '<!DOCTYPE html><html><head><title>Forbidden</title></head><body><h1>403 Forbidden</h1><p>Access denied.</p></body></html>';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type text/html;
            return 500 '<!DOCTYPE html><html><head><title>Server Error</title></head><body><h1>Server Error</h1><p>Please try again later.</p></body></html>';
        }
    }

    # HTTPS server block (for production)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Include all location blocks from above
    # }
}
