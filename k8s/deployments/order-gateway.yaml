apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-gateway
  namespace: cafeteria-system
  labels:
    app: order-gateway
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-gateway
  template:
    metadata:
      labels:
        app: order-gateway
        tier: backend
    spec:
      containers:
      - name: order-gateway
        image: ${REGISTRY}/order-gateway:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: PORT
          value: "3002"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cafeteria-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)/1"
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: cafeteria-secrets
              key: RABBITMQ_URL
        - name: IDENTITY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: IDENTITY_SERVICE_URL
        - name: STOCK_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: STOCK_SERVICE_URL
        - name: JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: cafeteria-secrets
              key: JWT_PUBLIC_KEY
        - name: CACHE_TTL_MENU
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: CACHE_TTL_MENU
        - name: CACHE_TTL_STOCK
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: CACHE_TTL_STOCK
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-gateway-service
  namespace: cafeteria-system
  labels:
    app: order-gateway
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: order-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-gateway-hpa
  namespace: cafeteria-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
