apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-hub
  namespace: cafeteria-system
  labels:
    app: notification-hub
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-hub
  template:
    metadata:
      labels:
        app: notification-hub
        tier: backend
    spec:
      containers:
      - name: notification-hub
        image: ${REGISTRY}/notification-hub:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3005
          name: http
        - containerPort: 3005
          name: websocket
        env:
        - name: PORT
          value: "3005"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: NODE_ENV
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: cafeteria-secrets
              key: RABBITMQ_URL
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)/4"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-hub-service
  namespace: cafeteria-system
  labels:
    app: notification-hub
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - port: 3005
    targetPort: 3005
    protocol: TCP
    name: websocket
  selector:
    app: notification-hub
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-hub-hpa
  namespace: cafeteria-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-hub
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  - type: Pods
    pods:
      metric:
        name: websocket_connections
      target:
        type: AverageValue
        averageValue: "5000"
