apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-queue
  namespace: cafeteria-system
  labels:
    app: kitchen-queue
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kitchen-queue
  template:
    metadata:
      labels:
        app: kitchen-queue
        tier: backend
    spec:
      containers:
      - name: kitchen-queue
        image: ${REGISTRY}/kitchen-queue:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
          name: http
        env:
        - name: PORT
          value: "3004"
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: cafeteria-config
              key: NODE_ENV
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: cafeteria-secrets
              key: RABBITMQ_URL
        - name: REDIS_URL
          value: "redis://$(REDIS_HOST):$(REDIS_PORT)/3"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-queue-service
  namespace: cafeteria-system
  labels:
    app: kitchen-queue
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: http
  selector:
    app: kitchen-queue
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kitchen-queue-hpa
  namespace: cafeteria-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kitchen-queue
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: rabbitmq_queue_depth
      target:
        type: AverageValue
        averageValue: "50"
