# NOTE: This is a template. In production, use sealed-secrets or external secret management
# kubectl create secret generic cafeteria-secrets --from-literal=... --namespace=cafeteria-system

apiVersion: v1
kind: Secret
metadata:
  name: cafeteria-secrets
  namespace: cafeteria-system
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: "cafeteria_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://cafeteria_user:CHANGE_ME_IN_PRODUCTION@postgres-service:5432/cafeteria_db"
  
  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  RABBITMQ_URL: "amqp://admin:CHANGE_ME_IN_PRODUCTION@rabbitmq-service:5672"
  
  # JWT Keys (base64 encoded)
  JWT_PRIVATE_KEY: "LS0tLS1CRUdJTi..." # Add your base64 encoded private key
  JWT_PUBLIC_KEY: "LS0tLS1CRUdJTi..."  # Add your base64 encoded public key
  
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
  namespace: cafeteria-system
type: Opaque
data:
  private.key: LS0tLS1CRUdJTi... # base64 encoded private key
  public.key: LS0tLS1CRUdJTi...  # base64 encoded public key
