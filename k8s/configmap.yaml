apiVersion: v1
kind: ConfigMap
metadata:
  name: cafeteria-config
  namespace: cafeteria-system
data:
  # Database Configuration
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # RabbitMQ Configuration
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  
  # Service URLs
  IDENTITY_SERVICE_URL: "http://identity-provider-service:3001"
  ORDER_GATEWAY_URL: "http://order-gateway-service:3002"
  STOCK_SERVICE_URL: "http://stock-service:3003"
  KITCHEN_QUEUE_URL: "http://kitchen-queue-service:3004"
  NOTIFICATION_HUB_URL: "http://notification-hub-service:3005"
  
  # Monitoring
  PROMETHEUS_URL: "http://prometheus-service:9090"
  GRAFANA_URL: "http://grafana-service:3200"
  JAEGER_URL: "http://jaeger-service:16686"
  
  # Application Settings
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CACHE_TTL_MENU: "300"
  CACHE_TTL_STOCK: "30"
