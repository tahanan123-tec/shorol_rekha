# AWS EKS Cluster Configuration
# Deploy using eksctl or Terraform

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cafeteria-cluster
  region: us-east-1
  version: "1.28"

# VPC Configuration
vpc:
  cidr: 10.0.0.0/16
  nat:
    gateway: HighlyAvailable
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

# IAM OIDC Provider
iam:
  withOIDC: true
  serviceAccounts:
  - metadata:
      name: aws-load-balancer-controller
      namespace: kube-system
    wellKnownPolicies:
      awsLoadBalancerController: true
  - metadata:
      name: ebs-csi-controller-sa
      namespace: kube-system
    wellKnownPolicies:
      ebsCSIController: true
  - metadata:
      name: cluster-autoscaler
      namespace: kube-system
    wellKnownPolicies:
      autoScaler: true

# Managed Node Groups
managedNodeGroups:
  # General Purpose Nodes
  - name: general-purpose
    instanceType: t3.large
    desiredCapacity: 3
    minSize: 2
    maxSize: 10
    volumeSize: 50
    volumeType: gp3
    labels:
      role: general
    tags:
      nodegroup-role: general
    iam:
      withAddonPolicies:
        imageBuilder: true
        autoScaler: true
        ebs: true
        efs: true
        albIngress: true
        cloudWatch: true

  # High Memory Nodes (for databases)
  - name: high-memory
    instanceType: r5.xlarge
    desiredCapacity: 2
    minSize: 1
    maxSize: 5
    volumeSize: 100
    volumeType: gp3
    labels:
      role: database
    taints:
      - key: workload
        value: database
        effect: NoSchedule
    tags:
      nodegroup-role: database

  # Compute Optimized (for high traffic)
  - name: compute-optimized
    instanceType: c5.2xlarge
    desiredCapacity: 2
    minSize: 1
    maxSize: 20
    volumeSize: 50
    volumeType: gp3
    labels:
      role: compute
    tags:
      nodegroup-role: compute

# Add-ons
addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest

# CloudWatch Logging
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
