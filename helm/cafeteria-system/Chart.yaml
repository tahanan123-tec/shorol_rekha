apiVersion: v2
name: cafeteria-system
description: A Helm chart for University Cafeteria Ordering System
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - cafeteria
  - ordering
  - microservices
  - nodejs
maintainers:
  - name: Cafeteria Team
    email: team@cafeteria.example.com
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: rabbitmq
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
  - name: prometheus
    version: "23.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "6.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
